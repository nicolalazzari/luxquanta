<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuxQuanta AI Strategy — Access</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #060B14;
      color: rgba(255,255,255,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: #111A2E;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 32px 28px;
      box-shadow: 0 0 40px rgba(0, 200, 224, 0.06);
    }
    h1 {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    h1 span { color: #00C8E0; }
    p.sub {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 8px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: #0B1221;
      color: #fff;
      font-size: 1rem;
      margin-bottom: 16px;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: rgba(0, 200, 224, 0.45);
    }
    button {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #00C8E0, #00E5A0);
      color: #060B14;
      font-weight: 700;
      font-size: 0.92rem;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .err {
      font-size: 0.82rem;
      color: #f87171;
      margin-top: 12px;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>LuxQuanta <span>AI Strategy</span></h1>
    <p class="sub">This deck is private. Enter the password you were given to continue.</p>
    <form id="f" autocomplete="current-password">
      <label for="p">Password</label>
      <input type="password" id="p" name="password" required autofocus>
      <button type="submit" id="btn">Unlock</button>
      <p class="err" id="err" role="alert"></p>
    </form>
  </div>
  <script>
    document.getElementById('f').addEventListener('submit', async function (e) {
      e.preventDefault();
      var btn = document.getElementById('btn');
      var err = document.getElementById('err');
      err.textContent = '';
      btn.disabled = true;
      try {
        var r = await fetch('/api/unlock', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ password: document.getElementById('p').value })
        });
        if (r.ok) {
          window.location.href = '/';
          return;
        }
        if (r.status === 503) {
          err.textContent = 'Login is not configured on this deployment.';
        } else {
          err.textContent = 'Incorrect password. Try again.';
        }
      } catch (x) {
        err.textContent = 'Network error. Retry.';
      }
      btn.disabled = false;
    });
  </script>
</body>
</html>
